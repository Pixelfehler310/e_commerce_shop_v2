services:
  shop-service:
    build:
      context: .
      dockerfile: shop-service/Dockerfile
    container_name: shop-service
    environment:
      SERVICE_NAME: shop-service
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-change-me-local}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176}
      SHOP_DATABASE_URL: ${SHOP_DATABASE_URL:-postgres://shop:shop@shop-db:5432/shop}
      SHOP_BASE_URL: ${SHOP_BASE_URL:-http://127.0.0.1:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://app:app@rabbitmq:5672}
      WAREHOUSE_BASE_URL: ${WAREHOUSE_BASE_URL:-http://warehouse-service:3000}
      BILLING_BASE_URL: ${BILLING_BASE_URL:-http://billing-service:3000}
      INVOICE_BASE_URL: ${INVOICE_BASE_URL:-http://invoice-service:3000}
      AUDIT_BASE_URL: ${AUDIT_BASE_URL:-http://audit-service:3000}
      AUDIT_EVENTS_EXCHANGE: ${AUDIT_EVENTS_EXCHANGE:-audit.domain-events}
      IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-86400}
    ports:
      - "${SHOP_SERVICE_PORT:-3000}:3000"
    depends_on:
      shop-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      warehouse-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
    networks:
      - public-net
      - internal-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  warehouse-service:
    build:
      context: .
      dockerfile: warehouse-service/Dockerfile
    container_name: warehouse-service
    environment:
      SERVICE_NAME: warehouse-service
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WAREHOUSE_DATABASE_URL: ${WAREHOUSE_DATABASE_URL:-postgres://warehouse:warehouse@warehouse-db:5432/warehouse}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://app:app@rabbitmq:5672}
      WAREHOUSE_LOCK_TIMEOUT_MS: ${WAREHOUSE_LOCK_TIMEOUT_MS:-5000}
      WAREHOUSE_DEFAULT_RESERVATION_TTL_SECONDS: ${WAREHOUSE_DEFAULT_RESERVATION_TTL_SECONDS:-900}
    expose:
      - "3000"
    depends_on:
      warehouse-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    container_name: billing-service
    environment:
      SERVICE_NAME: billing-service
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BILLING_DATABASE_URL: ${BILLING_DATABASE_URL:-postgres://billing:billing@billing-db:5432/billing}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://app:app@rabbitmq:5672}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-stripe-sim}
      PAYMENT_WEBHOOK_DELAY_MS: ${PAYMENT_WEBHOOK_DELAY_MS:-2500}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-change-me-local}
    expose:
      - "3000"
    depends_on:
      billing-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  invoice-service:
    build:
      context: .
      dockerfile: invoice-service/Dockerfile
    container_name: invoice-service
    environment:
      SERVICE_NAME: invoice-service
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://app:app@rabbitmq:5672}
      INVOICE_OUTPUT_DIR: ${INVOICE_OUTPUT_DIR:-/data/invoices}
      INVOICE_RETRY_ATTEMPTS: ${INVOICE_RETRY_ATTEMPTS:-3}
      INVOICE_CIRCUIT_BREAKER_FAILURES: ${INVOICE_CIRCUIT_BREAKER_FAILURES:-3}
      INVOICE_CIRCUIT_BREAKER_OPEN_MS: ${INVOICE_CIRCUIT_BREAKER_OPEN_MS:-30000}
    expose:
      - "3000"
    volumes:
      - invoice-data:/data/invoices
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    container_name: audit-service
    environment:
      SERVICE_NAME: audit-service
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUDIT_DATABASE_URL: ${AUDIT_DATABASE_URL:-postgres://audit:audit@audit-db:5432/audit}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://app:app@rabbitmq:5672}
      AUDIT_STREAM_HEARTBEAT_MS: ${AUDIT_STREAM_HEARTBEAT_MS:-15000}
    expose:
      - "3000"
    depends_on:
      audit-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  simulation-panel:
    build:
      context: .
      dockerfile: frontends/simulation-panel/Dockerfile
      args:
        VITE_SHOP_API_BASE_URL: ${VITE_SHOP_API_BASE_URL:-http://localhost:3000}
    container_name: simulation-panel
    ports:
      - "${SIMULATION_PANEL_PORT:-5176}:80"
    depends_on:
      shop-service:
        condition: service_healthy
      warehouse-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      invoice-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    networks:
      - public-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5

  shop-db:
    image: postgres:16-alpine
    container_name: shop-db
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    volumes:
      - shop-db-data:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  warehouse-db:
    image: postgres:16-alpine
    container_name: warehouse-db
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
    volumes:
      - warehouse-db-data:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  billing-db:
    image: postgres:16-alpine
    container_name: billing-db
    environment:
      POSTGRES_DB: billing
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
    volumes:
      - billing-db-data:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing -d billing"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-db:
    image: postgres:16-alpine
    container_name: audit-db
    environment:
      POSTGRES_DB: audit
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
    volumes:
      - audit-db-data:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis-data:/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-app}
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks:
      - internal-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - loki
    networks:
      - public-net
      - internal-net

volumes:
  shop-db-data:
  warehouse-db-data:
  billing-db-data:
  audit-db-data:
  redis-data:
  rabbitmq-data:
  invoice-data:

networks:
  public-net:
  internal-net: